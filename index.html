<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiFlix — Catálogo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <p class="nav__logo">MIFLIX</p>

    <div class="nav__tabs">
        <button class="nav__tab activo" data-tipo="peliculas">Películas</button>
        <button class="nav__tab" data-tipo="series">Series</button>
    </div>

    <input type="text" class="nav__buscar" id="buscador" placeholder="Buscar por título o género...">

    <button class="btn-agregar" id="btnAbrirModal">+ Agregar</button>
</nav>

<main class="catalogo">
    <p class="catalogo__contador" id="contador"></p>
    <div class="grid" id="grid"></div>
</main>

<!-- Modal formulario (agregar / editar) -->
<div class="modal-fondo" id="modalFondo" hidden>
    <div class="modal">
        <div class="modal__cabecera">
            <h2 class="modal__titulo" id="modalTitulo">Agregar película</h2>
            <button class="modal__cerrar" id="btnCerrarModal" aria-label="Cerrar">&times;</button>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <form id="formulario">
            <input type="hidden" id="itemId">

            <div class="campo">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" required>
            </div>

            <div class="campo">
                <label for="portada">URL de la portada</label>
                <input type="url" id="portada" placeholder="https://..." required>
            </div>

            <div class="campo-fila">
                <div class="campo">
                    <label for="genero">Género</label>
                    <input type="text" id="genero" required>
                </div>
                <div class="campo">
                    <label for="anio">Año</label>
                    <input type="number" id="anio" required>
                </div>
            </div>

            <!-- Campos exclusivos de película -->
            <div class="campo campo-pelicula">
                <label for="duracion">Duración (minutos)</label>
                <input type="number" id="duracion">
            </div>

            <!-- Campos exclusivos de serie -->
            <div class="campo-fila campo-serie">
                <div class="campo">
                    <label for="temporadas">Temporadas</label>
                    <input type="number" id="temporadas">
                </div>
                <div class="campo">
                    <label for="episodios">Episodios</label>
                    <input type="number" id="episodios">
                </div>
            </div>

            <div class="campo-fila">
                <div class="campo">
                    <label for="idioma">Idioma</label>
                    <input type="text" id="idioma" required>
                </div>
                <div class="campo">
                    <label for="calificacion">Calificación (0-10)</label>
                    <input type="number" id="calificacion" min="0" max="10" step="0.1" required>
                </div>
            </div>

            <div class="campo">
                <label for="nc">Clasificación (ej. TV-MA, PG-13)</label>
                <input type="text" id="nc" required>
            </div>

            <div class="modal__acciones">
                <button type="button" class="btn-secundario" id="btnCancelar">Cancelar</button>
                <button type="submit" class="btn-primario" id="btnGuardar">Guardar</button>
            </div>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
